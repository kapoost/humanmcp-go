name: test

on:
  push:
    paths:
      - 'mysloodsiewnia/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'mysloodsiewnia/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mysloodsiewnia

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: mysloodsiewnia/requirements.txt

      - name: install deps
        run: pip install -r requirements.txt pytest httpx

      - name: test
        run: python -m pytest test_mysloodsiewnia.py -v --tb=short
