<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumanNetwork</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:  #0e0d0b; --bg2: #141210; --bg3: #1c1a16;
  --fg:  #ede8df; --mut: #7a7268; --dim: #3a3830; --fnt: #252320;
  --gold:#c9a96e; --gd:rgba(201,169,110,.08); --gb:rgba(201,169,110,.2);
  --b1:rgba(255,255,255,.06); --b2:rgba(255,255,255,.11);
  --grn:#6aab7e; --blu:#7aade0; --red:#d07070;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;
}
[data-theme="light"] {
  --bg:#faf8f3; --bg2:#f0ede5; --bg3:#e8e4d8;
  --fg:#1a1610; --mut:#7a7060; --dim:#cdc9bc; --fnt:#ede9df;
  --gold:#7a5510; --gd:rgba(122,85,16,.07); --gb:rgba(122,85,16,.18);
  --b1:rgba(0,0,0,.07); --b2:rgba(0,0,0,.13);
  --grn:#1d5c30; --blu:#1a4e8c; --red:#982020;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;}
a{color:var(--gold);text-decoration:none;}a:hover{text-decoration:underline;}
button{cursor:pointer;font-family:inherit;background:none;border:none;color:inherit;}
input{font-family:inherit;font-size:inherit;}
::placeholder{color:var(--mut);opacity:1;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--dim);}

.app{display:flex;flex-direction:column;height:100vh;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;height:42px;padding:0 1.4rem;flex-shrink:0;border-bottom:1px solid var(--b1);}
.logo{display:flex;align-items:center;gap:.5rem;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg);}
.lct{font-size:9px;color:var(--mut);letter-spacing:.06em;margin-left:.1rem;}
.hdr-r{display:flex;align-items:center;gap:.55rem;}
.hbtn{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--b2);border-radius:2px;color:var(--mut);transition:color .15s,border-color .15s;}
.hbtn:hover{color:var(--gold);border-color:var(--gb);}
.mob{display:none;}

/* Main */
.main{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.sidebar{width:228px;flex-shrink:0;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;}
.sbhd{padding:.65rem 1rem .5rem;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--b1);}
.sbsc{flex:1;overflow-y:auto;}

/* Add */
.add{padding:.7rem .9rem;border-bottom:1px solid var(--b1);}
.ar{display:flex;gap:.3rem;}
.ai{flex:1;font-size:10px;padding:5px 7px;border:1px solid var(--b2);border-radius:1px;background:var(--bg2);color:var(--fg);outline:none;min-width:0;}
.ai:focus{border-color:var(--gb);}
.ab{font-size:9px;padding:5px 9px;border:1px solid var(--gb);border-radius:1px;background:var(--gd);color:var(--gold);letter-spacing:.04em;transition:background .15s;}
.ab:hover{background:rgba(201,169,110,.15);}
.ab:disabled{opacity:.35;}
.ae{font-size:9px;color:var(--red);margin-top:.3rem;}
.ah{font-size:8px;color:var(--dim);margin-top:.25rem;letter-spacing:.05em;}

/* Person row */
.pr{display:flex;align-items:flex-start;gap:.55rem;padding:.55rem .9rem;border-bottom:1px solid var(--b1);transition:background .12s;}
.pr:hover{background:var(--fnt);}
.pav{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;margin-top:1px;}
.pi{flex:1;min-width:0;}
.pn{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm{font-size:8px;color:var(--mut);margin-top:1px;letter-spacing:.04em;}
.pe{font-size:8px;color:var(--red);margin-top:1px;}
.pa{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.pa button{font-size:8px;padding:2px 5px;border:1px solid var(--b2);border-radius:1px;color:var(--dim);}
.pa button:hover{color:var(--gold);border-color:var(--gb);}
.pa .del:hover{color:var(--red);border-color:var(--red);}
.sbmt{padding:1.5rem 1rem;font-size:9px;color:var(--mut);text-align:center;line-height:1.9;letter-spacing:.04em;}

/* Feed */
.feed{flex:1;overflow-y:auto;}
.fdin{padding:0;}

/* Empty */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:calc(100vh - 80px);text-align:center;padding:3rem;}
.etit{font-family:var(--serif);font-size:3.2rem;font-weight:300;font-style:italic;color:var(--fg);margin-bottom:.5rem;line-height:1.15;}
.esub{font-size:10px;color:var(--mut);letter-spacing:.18em;text-transform:uppercase;margin-bottom:2rem;}
.etry{font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:8px 22px;border:1px solid var(--gb);color:var(--gold);border-radius:2px;transition:background .15s;}
.etry:hover{background:var(--gd);}

/* Tile grid */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));border-top:1px solid var(--b1);}

/* Tile */
.ti-wrap{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);}
.ti-wrap.open{grid-column:1/-1;border-right:none;}
.tile{padding:1.6rem 1.8rem 1.4rem;min-height:180px;display:flex;flex-direction:column;cursor:pointer;transition:background .15s;}
.tile:hover{background:var(--fnt);}
.locked .tile{cursor:default;}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.8rem;}
.tile-badges{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}
.ftb{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:1px;}
.tp{background:var(--gd);color:var(--gold);border:1px solid var(--gb);}
.te{background:rgba(122,173,224,.07);color:var(--blu);border:1px solid rgba(122,173,224,.18);}
.tn{background:rgba(106,171,126,.07);color:var(--grn);border:1px solid rgba(106,171,126,.18);}
.ti,.td,.tc,.tx{background:var(--fnt);color:var(--mut);border:1px solid var(--b1);}
.tlk{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:1px;background:rgba(208,112,112,.07);color:var(--red);border:1px solid rgba(208,112,112,.18);}
.tsg{font-size:9px;padding:2px 6px;border-radius:1px;background:rgba(106,171,126,.07);color:var(--grn);border:1px solid rgba(106,171,126,.18);}
.tile-date{font-size:9px;color:var(--dim);letter-spacing:.04em;white-space:nowrap;flex-shrink:0;}
.tile-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.ftit{font-family:var(--serif);font-size:1.65rem;font-weight:400;line-height:1.25;color:var(--fg);transition:color .15s;margin-bottom:.5rem;}
.tile:hover .ftit{color:var(--gold);}
.fdsc{font-size:11px;color:var(--mut);line-height:1.55;margin-bottom:.4rem;}
.tile-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.7rem;}
.tile-author{display:flex;align-items:center;gap:.4rem;}
.fav{width:16px;height:16px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:#fff;}
.fau{font-size:10px;color:var(--mut);letter-spacing:.03em;}
.fgs{display:flex;gap:.35rem;flex-wrap:wrap;}
.fg{font-size:9px;color:var(--dim);letter-spacing:.05em;}
.fg::before{content:'#';color:var(--mut);opacity:.5;}

/* Expanded tile body */
.fbod{border-top:1px solid var(--b1);padding:2rem 1.8rem 1.6rem;display:grid;grid-template-columns:1fr min(540px,50%);gap:3rem;}
@media(max-width:900px){.fbod{grid-template-columns:1fr;gap:1.5rem;}}
.fbod-meta{display:flex;flex-direction:column;gap:.5rem;}
.fbod-author{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;}
.fbod-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
.fbod-name{font-size:12px;font-weight:500;}
.fbod-url{font-size:9px;color:var(--dim);letter-spacing:.04em;}
.fbod-sig{font-size:9px;color:var(--grn);letter-spacing:.04em;margin-top:.2rem;}
.fbdt{font-family:var(--serif);font-size:1.25rem;line-height:2.1;white-space:pre-wrap;color:var(--fg);}
.fbld{font-size:10px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase;}
.fbclose{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding:4px 10px;border:1px solid var(--b2);border-radius:1px;margin-top:1rem;display:inline-block;}
.fbclose:hover{color:var(--gold);border-color:var(--gb);}

/* Bottom nav */
.bnav{display:none;height:50px;border-top:1px solid var(--b1);background:var(--bg);flex-shrink:0;}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:7.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);transition:color .15s;border:none;background:none;padding:0;}
.bnb.on{color:var(--gold);}

@media(max-width:720px){
  .sidebar{display:none;} .mob{display:flex;} .bnav{display:flex;}
  .hdr{padding:0 1rem;} .fdin{padding:0 1rem 5rem;}
}
@media(min-width:721px){
  .bnav{display:none!important;}
  .mob-ppl{display:none!important;}
  .feed{display:block!important;}
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ldg{animation:pulse 1.4s infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect}=React;
const LS='humannetwork-v1', LT='humannetwork-theme';
const TCLS={poem:'tp',essay:'te',note:'tn',image:'ti',document:'td',contact:'tc',vector:'tx',capsule:'tx'};

function norm(u){return u.trim().replace(/\/$/,'').replace(/\/mcp$/,'');}
function gf(o,k){if(!o)return;return o[k]!==undefined?o[k]:o[k[0].toUpperCase()+k.slice(1)];}
function fmtDate(d){if(!d)return'';const dt=new Date(d);if(isNaN(dt))return'';return dt.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'});}
function initials(s=''){return s.split(/\s+/).filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase()||'H';}
const AVP=['#534AB7','#378ADD','#0F6E56','#BA7517','#993556','#185FA5','#993C1D','#639922'];
function avBg(url){let h=0;for(let i=0;i<url.length;i++)h=(h*31+url.charCodeAt(i))&0xffff;return AVP[h%AVP.length];}

function parseTextPieces(text){
  if(!text||typeof text!=='string')return[];
  const pieces=[];
  const MO={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  for(const block of text.split(/\n\n+/)){
    if(!block.includes('slug:'))continue;
    const p={};
    for(const line of block.split('\n')){
      const m=line.match(/^([\w-]+):\s+(.+)$/);if(!m)continue;
      const[,k,v]=[,m[1].trim(),m[2].trim()];
      if(k==='slug')p.slug=v;else if(k==='title')p.title=v;else if(k==='type')p.type=v;
      else if(k==='access')p.access=v;else if(k==='tags')p.tags=v.split(',').map(t=>t.trim()).filter(Boolean);
      else if(k==='about')p.description=v;
      else if(k==='date'){const dm=v.match(/(\d+)\s+(\w+)\s+(\d{4})/);if(dm&&MO[dm[2]]!==undefined)p.published=new Date(+dm[3],MO[dm[2]],+dm[1]).toISOString();}
    }
    if(p.slug)pieces.push(p);
  }
  return pieces;
}
function parsePieces(r){
  if(!r)return[];if(Array.isArray(r))return r;
  if(r.pieces&&Array.isArray(r.pieces))return r.pieces;
  if(typeof r==='string')return parseTextPieces(r);
  const a=Object.values(r).find(v=>Array.isArray(v));return a||[];
}
async function mcpCall(base,tool,args={}){
  const url=`${base}/mcp`;
  const bh={'Content-Type':'application/json','Accept':'application/json, text/event-stream'};
  let session=null;
  try{const ir=await fetch(url,{method:'POST',headers:bh,body:JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2024-11-05',capabilities:{},clientInfo:{name:'HumanNetwork',version:'0.2'}}})});session=ir.headers.get('mcp-session-id');}catch{}
  const h=session?{...bh,'mcp-session-id':session}:{...bh};
  const r=await fetch(url,{method:'POST',headers:h,body:JSON.stringify({jsonrpc:'2.0',id:Date.now(),method:'tools/call',params:{name:tool,arguments:args}})});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const ct=r.headers.get('content-type')||'';
  let data;
  if(ct.includes('event-stream')){const txt=await r.text();for(const line of txt.split('\n'))if(line.startsWith('data: ')){try{data=JSON.parse(line.slice(6));break;}catch{}}}
  else{data=await r.json();}
  if(!data)throw new Error('empty response');if(data.error)throw new Error(data.error.message||'MCP error');
  const block=(data.result?.content||[]).find(b=>b.type==='text');
  return block?block.text:null;
}
async function loadSub(url){
  let profile={title:url.replace('https://',''),description:'',tags:[]};
  try{const r=await fetch(`${url}/.well-known/mcp-server.json`);if(r.ok){const wk=await r.json();profile={title:wk.title||wk.name||profile.title,description:wk.description||'',tags:wk.tags||[]};}}catch{}
  let pieces=[],piecesErr=null;
  try{const t=await mcpCall(url,'list_content',{});pieces=parsePieces(t);if(!pieces.length&&t)piecesErr='No pieces parsed';}
  catch(e){piecesErr=e.message;}
  return{url,profile,pieces,piecesErr};
}

function PeoplePanel({subs,addUrl,setAddUrl,addB,addE,setAddE,add,refresh,remove}){
  return(<>
    <div className="sbhd">People</div>
    <div className="sbsc">
      <div className="add">
        <div className="ar">
          <input className="ai" value={addUrl} onChange={e=>{setAddUrl(e.target.value);setAddE('');}} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="https://someone.fly.dev"/>
          <button className="ab" onClick={add} disabled={addB||!addUrl.trim()}>{addB?'…':'add'}</button>
        </div>
        {addE&&<div className="ae">{addE}</div>}
        <div className="ah">any humanmcp server url</div>
      </div>
      {subs.length===0
        ?<div className="sbmt">No servers yet.<br/>Paste a URL above.</div>
        :subs.map(sub=>{
          const name=gf(sub.profile,'title')||sub.url.replace('https://','');
          const av=avBg(sub.url);
          return(
            <div key={sub.url} className="pr">
              <div className="pav" style={{background:av}}>{initials(name)}</div>
              <div className="pi">
                <div className="pn">{name}</div>
                <div className="pm">{sub.pieces?.length||0} pieces</div>
                {(sub.err||sub.piecesErr)&&<div className="pe">{sub.err||sub.piecesErr}</div>}
              </div>
              <div className="pa">
                <button onClick={()=>refresh(sub)} disabled={sub.refreshing}>{sub.refreshing?'…':'↻'}</button>
                <button className="del" onClick={()=>remove(sub.url)}>×</button>
              </div>
            </div>
          );
        })
      }
    </div>
  </>);
}

function PieceCard({piece,open,toggle,body,bodyLoading}){
  const sub=piece._sub;
  const slug=gf(piece,'slug');
  const title=gf(piece,'title')||slug;
  const type=(gf(piece,'type')||'note').toLowerCase();
  const pub=gf(piece,'published');
  const desc=gf(piece,'description');
  const tags=gf(piece,'tags')||[];
  const access=gf(piece,'access');
  const sig=gf(piece,'signature');
  const locked=access==='locked'||access==='members';
  const tc=TCLS[type]||'tx';
  const author=gf(sub.profile,'title')||sub.url.replace('https://','');
  const av=avBg(sub.url);
  return(
    <div className={`ti-wrap${open?' open':''}${locked?' locked':''}`}>
      <div className="tile" onClick={()=>!locked&&toggle(sub,piece)}>
        <div className="tile-top">
          <div className="tile-badges">
            <span className={`ftb ${tc}`}>{type}</span>
            {sig&&<span className="tsg">✓</span>}
            {locked&&<span className="tlk">locked</span>}
          </div>
          <span className="tile-date">{fmtDate(pub)}</span>
        </div>
        <div className="tile-body">
          <div className="ftit">{title}</div>
          {desc&&<div className="fdsc">{desc}</div>}
        </div>
        <div className="tile-foot">
          <div className="tile-author">
            <div className="fav" style={{background:av}}>{initials(author)}</div>
            <span className="fau">{author}</span>
          </div>
          {tags.length>0&&<div className="fgs">{tags.slice(0,3).map(t=><span key={t} className="fg">{t}</span>)}</div>}
        </div>
      </div>
      {open&&(
        <div className="fbod">
          <div className="fbod-meta">
            <div className="fbod-author">
              <div className="fbod-av" style={{background:av}}>{initials(author)}</div>
              <div>
                <div className="fbod-name">{author}</div>
                <div className="fbod-url">{sub.url.replace('https://','')}</div>
              </div>
            </div>
            <div className={`ftb ${tc}`} style={{display:'inline-block',width:'fit-content'}}>{type}</div>
            <div className="tile-date">{fmtDate(pub)}</div>
            {tags.length>0&&<div className="fgs" style={{marginTop:'.3rem'}}>{tags.map(t=><span key={t} className="fg">{t}</span>)}</div>}
            {sig&&<div className="fbod-sig">✓ Ed25519 signed</div>}
            <a href={`${sub.url}/p/${slug}`} target="_blank" rel="noopener noreferrer" className="fbclose">open original →</a>
            <div><button className="fbclose" style={{marginTop:'.4rem'}} onClick={e=>{e.stopPropagation();toggle(sub,piece);}}>▲ close</button></div>
          </div>
          <div>
            {bodyLoading
              ?<div className="fbld ldg">loading…</div>
              :<div className="fbdt">{body||'(empty)'}</div>
            }
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [theme,setTheme]=useState(()=>{const s=localStorage.getItem(LT);if(s)return s;return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';});
  const [subs,setSubs]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS)||'[]');}catch{return[];}});
  const [view,setView]=useState('feed');
  const [open,setOpen]=useState(null);
  const [bodies,setBodies]=useState({});
  const [bodyL,setBodyL]=useState(null);
  const [addUrl,setAddUrl]=useState('');
  const [addB,setAddB]=useState(false);
  const [addE,setAddE]=useState('');

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem(LT,theme);},[theme]);
  useEffect(()=>{localStorage.setItem(LS,JSON.stringify(subs.map(({url,profile,pieces})=>({url,profile,pieces}))));},[subs]);

  async function add(){
    const base=norm(addUrl);if(!base)return;
    if(subs.find(s=>s.url===base)){setAddE('Already added');return;}
    setAddB(true);setAddE('');
    try{const sub=await loadSub(base);setSubs(p=>[...p,sub]);setAddUrl('');}
    catch(e){setAddE(e.message||'Could not connect');}
    setAddB(false);
  }
  async function refresh(sub){
    setSubs(p=>p.map(s=>s.url===sub.url?{...s,refreshing:true,err:null}:s));
    try{const fresh=await loadSub(sub.url);setSubs(p=>p.map(s=>s.url===sub.url?{...fresh,refreshing:false}:s));}
    catch(e){setSubs(p=>p.map(s=>s.url===sub.url?{...s,refreshing:false,err:e.message}:s));}
  }
  function remove(url){setSubs(p=>p.filter(s=>s.url!==url));}
  async function toggle(sub,piece){
    const slug=gf(piece,'slug');const key=`${sub.url}::${slug}`;
    if(open===key){setOpen(null);return;}
    setOpen(key);if(bodies[key]!==undefined)return;
    setBodyL(key);
    try{const t=await mcpCall(sub.url,'read_content',{slug});setBodies(p=>({...p,[key]:t||'(no content)'}));}
    catch(e){setBodies(p=>({...p,[key]:`Error: ${e.message}`}));}
    setBodyL(null);
  }

  const feed=subs.flatMap(sub=>(sub.pieces||[]).map(p=>({...p,_sub:sub}))).sort((a,b)=>new Date(gf(b,'published')||0)-new Date(gf(a,'published')||0));
  const total=subs.reduce((n,s)=>n+(s.pieces?.length||0),0);
  const pp={subs,addUrl,setAddUrl,addB,addE,setAddE,add,refresh,remove};

  return(
    <div className="app">
      <div className="hdr">
        <div className="logo">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="var(--gold)" strokeWidth="1.2"/>
            <ellipse cx="6.5" cy="6.5" rx="2.5" ry="5.5" stroke="var(--gold)" strokeWidth="1"/>
            <path d="M1 6.5h11" stroke="var(--gold)" strokeWidth="1"/>
            <path d="M2 4h9M2 9h9" stroke="var(--gold)" strokeWidth=".7" strokeDasharray="1.8 1.5"/>
          </svg>
          HumanNetwork
          {total>0&&<span className="lct">· {total}</span>}
        </div>
        <div className="hdr-r">
          <button className="hbtn mob" onClick={()=>setView(v=>v==='feed'?'people':'feed')}>
            {view==='feed'?'people':'feed'}
          </button>
          <button className="hbtn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>
            {theme==='dark'?'day':'night'}
          </button>
        </div>
      </div>

      <div className="main">
        <div className="sidebar"><PeoplePanel {...pp}/></div>

        {/* Feed — always in DOM on desktop, hidden on mobile when view=people */}
        <div className="feed" style={{display: view==='people' ? 'none' : 'block'}}>
          <div className="fdin">
            {feed.length===0 ? (
              <div className="emp">
                <div className="etit">Nothing here yet.</div>
                <div className="esub">add a humanmcp server to begin</div>
                <button className="etry" onClick={()=>{setAddUrl('https://kapoost-humanmcp.fly.dev');setView('people');}}>try kapoost's server</button>
              </div>
            ) : (
              <div className="tgrid">
                {feed.map(piece=>{
                  const key=`${piece._sub.url}::${gf(piece,'slug')}`;
                  return <PieceCard key={key} piece={piece} open={open===key} toggle={toggle} body={bodies[key]} bodyLoading={bodyL===key}/>;
                })}
              </div>
            )}
          </div>
        </div>

        {/* People panel — mobile only */}
        {view==='people'&&(
          <div className="mob-ppl" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <PeoplePanel {...pp}/>
          </div>
        )}
      </div>

      <div className="bnav">
        <button className={`bnb${view==='feed'?' on':''}`} onClick={()=>setView('feed')}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3.5" width="12" height="1.2" rx=".6" fill="currentColor"/>
            <rect x="2" y="7.4" width="8" height="1.2" rx=".6" fill="currentColor"/>
            <rect x="2" y="11.3" width="10" height="1.2" rx=".6" fill="currentColor"/>
          </svg>
          Feed
        </button>
        <button className={`bnb${view==='people'?' on':''}`} onClick={()=>setView('people')}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" strokeWidth="1.2"/>
            <path d="M3 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
          People
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
