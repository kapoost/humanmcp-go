app = "kapoost-humanmcp"
primary_region = "ams"

[build]

[env]
  PORT        = "8080"
  CONTENT_DIR = "/data/content"
  AUTHOR_NAME = "kapoost"
  AUTHOR_BIO  = "I am a poet and a builder. I grew up in Zamość, studied in Wrocław, and ended up in Warsaw — though I spend as much time as I can at sea. I write because something in me has to. I sail because something in me must. I build software because the world needs more people who understand both code and silence. I am a CTO by trade, a sailor by temperament, and a poet by necessity. I started writing late. The poems are short. The sea is long."
  DOMAIN      = "kapoost.humanmcp.net"
  AI_METADATA = "true"   # set to "false" to disable AI assist on /new

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

[[mounts]]
  source      = "humanmcp_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
